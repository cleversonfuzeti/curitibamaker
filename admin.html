<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Curitiba Maker</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #f26522;
      --orange-dark: #cc4a10;
      --blue: #004f9f;
      --blue-mid: #0060c2;
      --white: #FFFFFF;
      --gray-light: #f4f5f7;
      --gray-mid: #d1d9e2;
      --gray-text: #555550;
      --text-dark: #112e5a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; color: var(--text-dark); background: var(--gray-light); display: flex; height: 100vh; overflow: hidden; }
    
    /* SIDEBAR */
    .sidebar { width: 250px; background: var(--blue); color: white; display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-header h2 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; text-transform: uppercase; }
    .sidebar-header h2 span { color: var(--orange); }
    .nav-list { list-style: none; padding: 1rem 0; flex: 1; }
    .nav-list li a { display: flex; align-items: center; padding: 0.8rem 1.5rem; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: background 0.2s, color 0.2s; }
    .nav-list li a:hover, .nav-list li a.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--orange); }
    
    /* MAIN AREA */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
    .header { background: white; height: 64px; min-height: 64px; display: flex; align-items: center; padding: 0 2rem; border-bottom: 1px solid var(--gray-mid); justify-content: space-between; }
    .header h1 { font-size: 1.1rem; color: var(--text-dark); font-weight: 700; }
    .user-info { font-size: 0.85rem; color: var(--gray-text); display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; background: var(--blue); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    
    /* CONTENT */
    .content { padding: 2rem; flex: 1; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .toolbar input { padding: 0.6rem 1rem; border: 1px solid var(--gray-mid); border-radius: 6px; font-family: inherit; width: 250px; }
    .btn { background: var(--orange); color: white; border: none; padding: 0.65rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; font-family: inherit; font-size: 0.85rem;}
    .btn:hover { background: var(--orange-dark); }
    .btn-secondary { background: white; color: var(--text-dark); border: 1px solid var(--gray-mid); }
    .btn-secondary:hover { background: var(--gray-light); }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.75rem;}
    
    /* TABLE */
    .table-card { background: white; border-radius: 8px; border: 1px solid var(--gray-mid); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 1rem 1.5rem; border-bottom: 1px solid var(--gray-mid); }
    th { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-text); background: #fafafa; font-weight: 600; }
    td { font-size: 0.9rem; color: var(--text-dark); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-light); }
    .cell-actions { display: flex; gap: 8px; }
    
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: white; width: 500px; max-width: 90%; border-radius: 8px; padding: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .modal h2 { margin-bottom: 1.5rem; font-size: 1.25rem; color: var(--blue); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-dark); }
    .form-group input, .form-group select { width: 100%; padding: 0.6rem; border: 1px solid var(--gray-mid); border-radius: 6px; font-family: inherit; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 2rem; }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>CURITIBA <span>MAKER</span></h2>
    </div>
    <ul class="nav-list">
      <li><a href="#">Dashboard</a></li>
      <li><a href="#" class="active">Cursos</a></li>
      <li><a href="#">Unidades</a></li>
      <li><a href="#">Configurações</a></li>
    </ul>
    <div style="margin-top:auto; padding: 1rem;">
      <a href="curitiba-maker (1).html" style="color:rgba(255,255,255,0.6); font-size: 0.8rem; text-decoration: none;">&larr; Voltar ao portal</a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <header class="header">
      <h1>Gerenciar Cursos</h1>
      <div class="user-info">
        <span>Administrador</span>
        <div class="user-avatar">AD</div>
      </div>
    </header>

    <div class="content">
      <div class="toolbar">
        <input type="text" placeholder="Buscar curso...">
        <button class="btn" onclick="openModal()">+ Adicionar Novo</button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome do Curso</th>
              <th>Categoria</th>
              <th>Carga Horária</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaCursosBody">
            <!-- Linhas populadas dinamicamente via Javascript -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- MODAL DE EDIÇÃO -->
  <div class="modal-overlay" id="formModal">
    <div class="modal">
      <h2 id="modalTitle">Cadastrar Curso</h2>
      <form id="adminForm">
        <div class="form-group">
          <label>Nome do Curso</label>
          <input type="text" id="cursoNome" placeholder="Ex: Robótica Básica" required>
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="cursoCategoria">
            <option value="Fabricação Digital">Fabricação Digital</option>
            <option value="Eletrônica">Eletrônica</option>
            <option value="Programação">Programação</option>
            <option value="Design">Design</option>
          </select>
        </div>
        <div style="display:flex; gap:10px;">
          <div class="form-group" style="flex:1;">
            <label>Carga Horária (ex: 20h)</label>
            <input type="text" id="cursoCarga" placeholder="Ex: 20h" required>
          </div>
          <div class="form-group" style="flex:1;">
            <label>Nível</label>
            <select id="cursoNivel">
              <option value="Iniciante">Iniciante</option>
              <option value="Básico">Básico</option>
              <option value="Avançado">Avançado</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="cursoStatus">
            <option value="Ativo">Ativo</option>
            <option value="Rascunho">Rascunho</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    // --- CONFIGURAÇÃO DO FIREBASE ---
    // Você vai colar suas chaves do Firebase Console aqui para ativar a comunicação real.
    // Enquanto estiver vazio, o painel usará o LocalStorage do navegador.
    const firebaseConfig = {
      // apiKey: "COLE_SUA_API_KEY",
      // authDomain: "SEU_PROJETO.firebaseapp.com",
      // projectId: "SEU_PROJETO",
      // storageBucket: "SEU_PROJETO.appspot.com",
      // messagingSenderId: "COLE_O_SENDER_ID",
      // appId: "COLE_O_APP_ID"
    };

    const useFirebase = Object.keys(firebaseConfig).length > 0;
    let db;
    let firebaseCursosCollection;
    
    if (useFirebase) {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      firebaseCursosCollection = collection(db, "cursos");
    }

    const tbody = document.getElementById('tabelaCursosBody');
    let currentEditId = null;

    // Funções Globais (acessíveis pelo HTML inline onclick)
    window.openModal = function(id = null, cursoData = null) {
      currentEditId = id;
      document.getElementById('modalTitle').textContent = id ? "Editar Curso" : "Cadastrar Curso";
      document.getElementById('formModal').style.display = 'flex';
      
      if (cursoData) {
        document.getElementById('cursoNome').value = cursoData.nome || '';
        document.getElementById('cursoCategoria').value = cursoData.categoria || 'Fabricação Digital';
        document.getElementById('cursoCarga').value = cursoData.carga || '';
        document.getElementById('cursoNivel').value = cursoData.nivel || 'Iniciante';
        document.getElementById('cursoStatus').value = cursoData.status || 'Ativo';
      } else {
        document.getElementById('adminForm').reset();
      }
    };

    window.closeModal = function() {
      document.getElementById('formModal').style.display = 'none';
      currentEditId = null;
    };

    window.deleteCurso = async function(id) {
      if (!confirm("Tem certeza que deseja excluir este curso?")) return;
      
      if (useFirebase) {
        try {
          await deleteDoc(doc(db, "cursos", id));
        } catch(e) { 
          console.error(e); 
          alert("Erro ao excluir do Firebase."); 
        }
      } else {
        let dados = JSON.parse(localStorage.getItem('cursos_db') || '[]');
        dados = dados.filter(c => c.id !== id);
        localStorage.setItem('cursos_db', JSON.stringify(dados));
      }
      carregarDados();
    };

    async function carregarDados() {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Carregando...</td></tr>';
      let cursosList = [];

      if (useFirebase) {
        try {
          const querySnapshot = await getDocs(firebaseCursosCollection);
          querySnapshot.forEach((doc) => {
            cursosList.push({ id: doc.id, ...doc.data() });
          });
        } catch (e) {
          console.error("Erro ao ler Firebase: ", e);
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: red;">Erro ao carregar dados do Firebase. Veja o console.</td></tr>';
          return;
        }
      } else {
        // Fallback para LocalStorage se Firebase não estiver configurado
        cursosList = JSON.parse(localStorage.getItem('cursos_db') || '[]');
        if (cursosList.length === 0) {
          cursosList = [
            { id: "001", nome: "Impressão 3D: Introdução ao FDM", categoria: "Fabricação Digital", carga: "16h", nivel: "Básico", status: "Ativo" },
            { id: "002", nome: "Arduino: Introdução com Sensores", categoria: "Eletrônica", carga: "20h", nivel: "Iniciante", status: "Ativo" }
          ];
          localStorage.setItem('cursos_db', JSON.stringify(cursosList));
        }
      }
      renderTable(cursosList);
    }

    function renderTable(dados) {
      tbody.innerHTML = '';
      if (dados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Nenhum curso encontrado.</td></tr>';
        return;
      }

      dados.forEach(curso => {
        const tr = document.createElement('tr');
        const statusColor = curso.status === 'Ativo' ? 'var(--blue)' : 'var(--gray-text)';
        const safeData = JSON.stringify(curso).replace(/'/g, "&apos;").replace(/"/g, "&quot;");
        
        tr.innerHTML = `
          <td>${curso.id.substring(0,6)}...</td>
          <td>${curso.nome}</td>
          <td>${curso.categoria}</td>
          <td>${curso.carga}</td>
          <td><span style="color:${statusColor}; font-weight:bold;">${curso.status || 'Ativo'}</span></td>
          <td class="cell-actions">
            <button class="btn btn-secondary btn-sm" onclick="openModal('${curso.id}', ${safeData})">Editar</button>
            <button class="btn btn-secondary btn-sm" style="color:#d32f2f; border-color:#ffcdd2;" onclick="deleteCurso('${curso.id}')">Excluir</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Formulário Submit (Criar ou Atualizar)
    document.getElementById('adminForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const novoCurso = {
        nome: document.getElementById('cursoNome').value,
        categoria: document.getElementById('cursoCategoria').value,
        carga: document.getElementById('cursoCarga').value,
        nivel: document.getElementById('cursoNivel').value,
        status: document.getElementById('cursoStatus').value
      };

      if (useFirebase) {
        try {
          if (currentEditId) {
            await updateDoc(doc(db, "cursos", currentEditId), novoCurso);
          } else {
            await addDoc(firebaseCursosCollection, novoCurso);
          }
        } catch(e) {
          console.error("Erro salvando no Firebase", e);
          alert("Erro ao salvar no banco Firebase");
          return;
        }
      } else {
        let dados = JSON.parse(localStorage.getItem('cursos_db') || '[]');
        if (currentEditId) {
          const index = dados.findIndex(c => c.id === currentEditId);
          if (index !== -1) dados[index] = { ...novoCurso, id: currentEditId };
        } else {
          novoCurso.id = "local_" + new Date().getTime();
          dados.push(novoCurso);
        }
        localStorage.setItem('cursos_db', JSON.stringify(dados));
      }

      closeModal();
      carregarDados();
    });

    // Início
    document.addEventListener("DOMContentLoaded", () => {
      carregarDados();
    });
  </script>
</body>
</html>
